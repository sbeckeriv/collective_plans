---
layout: default
title: Pinball Strategy Guides
---
<p>Master the game with comprehensive strategy guides for classic and modern pinball machines.</p>

<!-- Filters -->
<div class="filters">
    <div class="filter-group">
        <label>Search:</label>
        <input type="text" id="filter-search" placeholder="Search machines..." oninput="filterMachines()">
    </div>

    <div class="filter-group">
        <label>Manufacturer:</label>
        <select id="filter-manufacturer" onchange="filterMachines()">
            <option value="">All</option>
            {% assign manufacturers = site.pinball | map: "manufacturer" | uniq | sort %}
            {% for mfg in manufacturers %}
            <option value="{{ mfg }}">{{ mfg }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="filter-group">
        <label>Type:</label>
        <select id="filter-type" onchange="filterMachines()">
            <option value="">All</option>
            {% assign types = site.pinball | map: "type" | uniq | sort %}
            {% for type in types %}
            <option value="{{ type }}">{{ type }}</option>
            {% endfor %}
        </select>
    </div>

    <button onclick="clearFilters()" class="btn-clear">Clear Filters</button>

    <p><span id="machine-count">{{ site.pinball.size }}</span> machines in the database.</p>
</div>

<!-- All machines data (hidden, for search) -->
<script id="all-machines-data" type="application/json">
[
  {% for machine in site.pinball %}
  {
    "title": {{ machine.title | jsonify }},
    "manufacturer": {{ machine.manufacturer | jsonify }},
    "type": {{ machine.type | jsonify }},
    "year": {{ machine.year | jsonify }},
    "updated": {{ machine.updated | jsonify }},
    "url": {{ machine.url | relative_url | jsonify }},
    "image": {{ machine.image | relative_url | jsonify }}
  }{% unless forloop.last %},{% endunless %}
  {% endfor %}
]
</script>

<div class="machine-grid" id="machine-grid"></div>

<script>
    const totalMachineCount = {{ site.pinball.size }};
    let allMachines = [];

    // Load all machines data
    try {
        allMachines = JSON.parse(document.getElementById('all-machines-data').textContent);
        // Sort by updated date (newest first), then by title
        allMachines.sort((a, b) => {
            if (a.updated && b.updated) {
                return b.updated.localeCompare(a.updated);
            }
            return a.title.localeCompare(b.title);
        });
    } catch (e) {
        console.error('Failed to load machine data:', e);
    }

    function renderMachines(machines) {
        const grid = document.getElementById('machine-grid');
        grid.innerHTML = machines.map(machine => `
            <div class="machine-card">
                ${machine.image ? `
                    <a href="${machine.url}">
                        <img src="${machine.image}" alt="${machine.title}" loading="lazy">
                    </a>
                ` : ''}
                <h2><a href="${machine.url}">${machine.title}</a></h2>
                <p><strong>${machine.manufacturer}</strong> &bull; ${machine.year}</p>
                <p><em>${machine.type}</em></p>
            </div>
        `).join('');
    }

    function filterMachines() {
        const searchFilter = document.getElementById('filter-search').value.toLowerCase();
        const mfgFilter = document.getElementById('filter-manufacturer').value;
        const typeFilter = document.getElementById('filter-type').value;

        const hasFilters = searchFilter || mfgFilter || typeFilter;

        let filtered = allMachines;

        if (hasFilters) {
            // Filter machines
            filtered = allMachines.filter(machine => {
                const searchMatch = !searchFilter || machine.title.toLowerCase().includes(searchFilter);
                const mfgMatch = !mfgFilter || machine.manufacturer === mfgFilter;
                const typeMatch = !typeFilter || machine.type === typeFilter;
                return searchMatch && mfgMatch && typeMatch;
            });
        }

        // Update count and render
        document.getElementById('machine-count').textContent = filtered.length;
        renderMachines(filtered);
    }

    function clearFilters() {
        document.getElementById('filter-search').value = '';
        document.getElementById('filter-manufacturer').value = '';
        document.getElementById('filter-type').value = '';
        filterMachines();
    }

    // Initial render on page load
    document.addEventListener('DOMContentLoaded', () => {
        renderMachines(allMachines);
    });
</script>
