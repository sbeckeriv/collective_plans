title: Pinball
description: AI-generated pinball strategy guides for players seeking to master the game.
baseurl: "/collective_plans"
url: "https://sbeckeriv.github.io"

theme: minima

# --- Files to exclude from build ---
exclude:
  - machines/
  - setup.sh
  - load.sh
  - validate-images.sh
  - standardize_manufacturers.py
  - standardize_manufacturers.sh
  - README
  - Gemfile
  - Gemfile.lock

# --- Collection ---
collections:
  pinball:
    output: true
    permalink: /:collection/:slug/

# --- Default front matter for all machines ---
defaults:
  - scope:
      path: ""
      type: pinball
    values:
      layout: machine

# --- Pagination (jekyll-paginate-v2) ---
pagination:
  enabled: true
  collection: pinball
  per_page: 24
  sort_field: title
  sort_reverse: false
  trail:
    before: 2
    after: 2

# --- Plugins ---
plugins:
  - jekyll-paginate-v2
  - jekyll-seo-tag
  - jekyll-sitemap

minima:
  skin: classic
